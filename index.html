<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTA CERTA SP - TESTE DB (v4.7.2)</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --l3: #EE3E34; --bg-color: #000000; --card-bg: #1A1A1A; 
            --text-main: #FFFFFF; --text-muted: #CCCCCC; --border-color: #444444; 
            --btn-color: #EE3E34; --input-bg: #000000; --group-bg: #111111; --train-bg: #050505;
        }
        body.light-mode {
            --bg-color: #F0F2F5; --card-bg: #FFFFFF; --text-main: #111111;
            --text-muted: #555555; --border-color: #DDDDDD; --input-bg: #FFFFFF;
            --group-bg: #F9F9F9; --train-bg: #EAEAEA;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .app-view { display: none; width: 100%; max-width: 420px; flex-direction: column; }
        .app-view.active { display: flex; }
        .container { background-color: var(--card-bg); border-radius: 12px; padding: 24px; border: 1px solid var(--border-color); }
        
        /* HERO HEADER */
        .hero-header-main { position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .hero-logo-svg { height: 45px; margin-bottom: 12px; }
        .hero-title { font-size: 2.2rem; font-weight: 800; margin: 0; }
        .logo-door-target { fill: #4CAF50; animation: logoPulse 2s infinite; }
        @keyframes logoPulse { 0%, 100% { filter: drop-shadow(0 0 2px #4CAF50); } 50% { filter: drop-shadow(0 0 8px #4CAF50); } }
        body.light-mode .hero-logo-svg rect[fill="#1A1A1A"] { fill: #FFFFFF; }
        body.light-mode .hero-logo-svg rect[fill="#000"] { fill: #E0E0E0; }
        body.light-mode .hero-logo-svg line { stroke: #CCC; }

        .selection-group { background-color: var(--group-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
        select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; background: var(--input-bg); color: var(--text-main); border: 2px solid var(--border-color); font-size: 1rem; }
        .btn-action { width: 100%; padding: 16px; background: var(--btn-color); color: #FFF; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        .result-box { background: var(--group-bg); padding: 20px; border-radius: 8px; margin-top: 15px; border: 1px solid var(--border-color); }
        .result-door { font-size: 1.8rem; font-weight: 900; margin: 8px 0; color: var(--l3); }
        .info-text { font-size: 1rem; line-height: 1.4; color: var(--text-muted); margin-bottom: 10px; }
        .alert-warning { font-size: 0.95rem; padding: 12px; border-radius: 6px; color: #FF3B30; border: 1px solid #FF3B30; }

        /* TREM */
        .t-container { width: 100%; height: 85px; background: var(--train-bg); border-radius: 8px; position: relative; overflow: hidden; margin: 10px 0; border: 1px solid var(--border-color); }
        .t-track { position: absolute; height: 2px; width: 100%; bottom: 15px; background: var(--border-color); }
        .t-wrapper { position: absolute; display: flex; align-items: center; gap: 6px; padding: 0 10px; height: 100%; transition: transform 1.2s ease; z-index: 1;}
        .t-car { width: 85px; height: 32px; border: 2px solid var(--l3); background: var(--card-bg); border-radius: 3px; display: flex; justify-content: space-evenly; align-items: flex-end; position: relative;}
        .t-car::after { content: attr(data-label); position: absolute; top: -20px; font-size: 0.65rem; color: #888; font-weight: bold; width: 100%; text-align: center; }
        .t-door { width: 10px; height: 16px; background: var(--group-bg); border: 1px solid var(--border-color); border-radius: 2px 2px 0 0; }
        .t-door.target { background: #4CAF50; border-color: #FFF; box-shadow: 0 0 8px #4CAF50; position: relative; }
        .t-door.target::before { content: '▼'; position: absolute; top: -22px; left: -3px; color: #4CAF50; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="view-main" class="app-view active">
    <div class="container">
        
        <div class="hero-header-main">
            <svg class="hero-logo-svg" viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg">
                <rect x="5" y="5" width="110" height="30" rx="4" fill="#1A1A1A" stroke="#888" stroke-width="2"/>
                <rect x="15" y="12" width="12" height="23" rx="1.5" fill="#000" stroke="#444" stroke-width="1.5"/>
                <rect x="40" y="12" width="12" height="23" rx="1.5" fill="#000" stroke="#444" stroke-width="1.5"/>
                <rect x="65" y="12" width="12" height="23" rx="1.5" class="logo-door-target"/>
                <rect x="90" y="12" width="12" height="23" rx="1.5" fill="#000" stroke="#444" stroke-width="1.5"/>
            </svg>
            <h1 class="hero-title">PORTA CERTA SP</h1>
            <p style="color: var(--text-muted); margin-top: 5px; font-size: 0.9rem;">(Módulo de Teste DB L3)</p>
        </div>

        <label>Sua preferência de saída no destino final:</label>
        <select id="preferencia">
            <option value="rolante">Escada Rolante</option>
            <option value="fixa">Escada Fixa</option>
            <option value="elevador">Elevador</option>
        </select>

        <div class="selection-group">
            <label>📍 Origem (Embarque):</label>
            <select id="estacao-origem" onchange="UI.limpar()">
                <option value="ITQ">Corinthians-Itaquera</option>
                <option value="ART">Artur Alvim</option>
                <option value="PCA">Patriarca</option>
            </select>
        </div>

        <div class="selection-group">
            <label>🏁 Destino (Desembarque):</label>
            <select id="estacao-destino" onchange="UI.limpar()">
                <option value="ITQ">Corinthians-Itaquera</option>
                <option value="ART" selected>Artur Alvim</option>
                <option value="PCA">Patriarca</option>
            </select>
        </div>

        <button class="btn-action" onclick="UI.iniciarCalculo()">Qual é a Porta Certa?</button>
        
        <div id="resultado-box" class="result-box" style="display:none"></div>
    </div>
</div>

<script>
/**
 * DADOS DE TESTE 
 * S1 = Itaquera
 * S2 = Barra Funda
 */
const AppData = {
    ordemL3: ["ITQ", "ART", "PCA"], // Sentido geográfico: Menor (0) para Maior (2) = Sentido Barra Funda (S2)
    estacoes: {
        "ITQ": { nome: "Corinthians-Itaquera", dbStr: "ITAS2E11,ITAS2F44,ITAS2F31,ITAS2R44-I,ITAS2R54-I,ITAS2R31-O,ITAS2R21-I,ITAS2R21-O" },
        "ART": { nome: "Artur Alvim", dbStr: "ARTS1E64,ARTS1F24,ARTS1F33,ARTS1R24-O,ARTS1R33-I,ARTS1R43-O,ARTS2E65,ARTS2F25,ARTS2F36,ARTS2R25-O,ARTS2R36-I,ARTS2R47-O" },
        "PCA": { nome: "Patriarca", dbStr: "PCAS1E11,PCAS1F44,PCAS1R34-I,PCAS1R34-O,PCAS1R31-I,PCAS1R31-O,PCAS2E18,PCAS2F45,PCAS2R35-I,PCAS2R35-O,PCAS2R38-I,PCAS2R38-O" }
    }
};

const Router = {
    calcularSentido: function(idOr, idDest) {
        let idxOr = AppData.ordemL3.indexOf(idOr);
        let idxDest = AppData.ordemL3.indexOf(idDest);
        // Se Origem < Destino na array (Ex: ITQ[0] -> ART[1]), é S2 (Barra Funda)
        // Se Origem > Destino na array (Ex: PCA[2] -> ART[1]), é S1 (Itaquera)
        return idxOr < idxDest ? "S2" : "S1"; 
    },
    
    extrairPortaAlvo: function(nodeDest, sentido, pref) {
        if (!nodeDest.dbStr) return null;

        // Converter preferência para a letra do DB
        let tipo = 'F';
        if (pref === 'elevador') tipo = 'E';
        if (pref === 'rolante') tipo = 'R';

        let tokens = nodeDest.dbStr.split(',');
        let prefixoEstacao = nodeDest.dbStr.substring(0,3); // Ex: ITA, ART, PCA
        let prefixoBusca = `${prefixoEstacao}${sentido}${tipo}`; // Ex: ARTS2R

        let match = null;

        if (tipo === 'R') {
            // Se for escada rolante, a prioridade absoluta é achar a que termina com -O (Desembarque/Output)
            match = tokens.find(t => t.startsWith(prefixoBusca) && t.endsWith('-O'));
        } else {
            // Para Elevador(E) e Fixa(F), que não têm marcação I/O na sua DB de exemplo
            match = tokens.find(t => t.startsWith(prefixoBusca));
        }
        
        // Se não achou com -O, tenta achar qualquer uma genérica que não seja de embarque (-I)
        if (!match) {
            match = tokens.find(t => t.startsWith(prefixoBusca) && !t.endsWith('-I'));
        }

        if (match) {
            let num = match.match(/\d{2}/);
            return num ? num[0] : null;
        }
        
        return null;
    },
    
    parseVagaoPorta: function(rawNumStr) {
        // Mantido Inalterado: 11 = vagão 1, porta 1 (como solicitado)
        if (!rawNumStr || rawNumStr.length !== 2) return null;
        let v = parseInt(rawNumStr.charAt(0));
        let p = parseInt(rawNumStr.charAt(1));
        return { v: v, p: p };
    }
};

const UI = {
    limpar: () => document.getElementById('resultado-box').style.display = 'none',
    
    iniciarCalculo: function() {
        const or = document.getElementById('estacao-origem').value;
        const dest = document.getElementById('estacao-destino').value;
        const pref = document.getElementById('preferencia').value;
        const box = document.getElementById('resultado-box');
        
        if (or === dest) {
            box.innerHTML = `<div class="info-text" style="text-align:center;">Você já está na estação de destino.</div>`;
            box.style.display = 'block';
            return;
        }

        const sentido = Router.calcularSentido(or, dest);
        const portaStr = Router.extrairPortaAlvo(AppData.estacoes[dest], sentido, pref);
        
        let htmlFinal = `<div class="info-text">Em <b>${AppData.estacoes[or].nome}</b>, embarque na:</div>`;
        
        if (portaStr) {
            let parsed = Router.parseVagaoPorta(portaStr);
            htmlFinal += `<div class="result-door">Porta ${portaStr}</div>`;
            htmlFinal += `<div class="info-text" style="font-size: 0.9rem;">(Vagão ${parsed.v}, Porta ${parsed.p})</div>`;
            htmlFinal += this.gerarTrem(parsed.v, parsed.p);
            
            let txtPref = pref === 'rolante' ? 'escada rolante' : (pref === 'elevador' ? 'porta do elevador' : 'escada fixa');
            htmlFinal += `<div class="info-text" style="margin-top:15px; padding-top:10px; border-top: 1px dashed #444;">No destino (<b>${AppData.estacoes[dest].nome}</b>), você sairá de frente para a ${txtPref} de desembarque.</div>`;
        } else {
            htmlFinal += `<div class="alert-warning">🚫 Equipamento inexistente nesta estação (Sentido ${sentido}).</div>`;
        }

        box.innerHTML = htmlFinal;
        box.style.display = 'block';
        this.ajustarTrem();
    },
    
    gerarTrem: function(vt, pt) {
        let html = '<div class="t-container"><div class="t-track"></div><div class="t-wrapper">';
        for(let v=1; v<=6; v++) {
            html += `<div class="t-car" data-label="C${v}">`;
            for(let p=1; p<=4; p++) {
                let isTarget = (v === vt && p === pt);
                html += `<div class="t-door ${isTarget ? 'target' : ''}"></div>`;
            }
            html += `</div>`;
        }
        return html + '</div></div>';
    },
    
    ajustarTrem: function() {
        setTimeout(() => {
            let target = document.querySelector('.t-door.target');
            let wrapper = document.querySelector('.t-wrapper');
            let container = document.querySelector('.t-container');
            if (target && wrapper && container) {
                let cWidth = container.offsetWidth;
                let tOffset = target.getBoundingClientRect().left - wrapper.getBoundingClientRect().left;
                let tWidth = target.offsetWidth;
                let translateX = (cWidth / 2) - tOffset - (tWidth / 2);
                wrapper.style.transform = `translateX(${translateX}px)`;
            }
        }, 50);
    }
};

window.onload = function() {
    UI.limpar();
};
</script>
</body>
</html>
